<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manufacturing Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="../config.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  /* Neutral dark theme — accent overridden at runtime from TEAM_CONFIG */
  --accent:#446ce3;  --accent-dim:rgba(68,108,227,0.15);
  --text:#e2e4ec;    --muted:#6b7280;
  --bg:#0d1117;      --bg-card:#161b22;  --bg-item:#1c2232;  --bg-col:#131720;
  --border:rgba(255,255,255,0.08);       --input-bg:#0d1014;
  --success:#22c55e; --danger:#ef4444;
  /* Legacy aliases */
  --gold:#fbbf24;  --cream:var(--text);  --blue-lt:var(--accent);
  --blue-md:#1a1f2e;  --blue-dk:var(--bg-card);
  --navy:var(--bg-col);  --navy-deep:var(--bg);
  --card-bg:var(--bg-item);  --col-bg:var(--bg-col);  --input-bg:var(--input-bg);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--navy-deep);color:var(--text);display:flex;flex-direction:column;}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:32px;background:radial-gradient(ellipse at 50% 0%,#1a2035 0%,#0d1014 100%);}
.auth-logo{display:flex;align-items:center;gap:20px;}
.auth-logo-icon{display:block;width:80px;height:80px;flex-shrink:0;}
.auth-logo-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.1rem;letter-spacing:.08em;text-transform:uppercase;color:#e2e4ec;line-height:1.1;}
.auth-logo-sub{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;color:#6b7280;margin-top:3px;}
.auth-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:16px;min-width:320px;box-shadow:0 0 0 1px rgba(68,108,227,0.12),0 24px 48px rgba(0,0,0,0.4);}
.auth-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cream);border-top:1px solid var(--border);padding-top:16px;text-align:center;width:100%;}
.auth-card p{font-size:.8rem;color:var(--muted);text-align:center;line-height:1.5;}
.auth-error{font-size:.78rem;color:var(--danger);text-align:center;display:none;width:100%;}
.auth-divider{display:flex;align-items:center;gap:10px;width:100%;}
.auth-divider-line{flex:1;height:1px;background:rgba(107,132,184,0.2);}
.auth-divider-text{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.btn-guest{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:9px 0;cursor:pointer;transition:all .15s;}
.btn-guest:hover{color:var(--cream);border-color:rgba(107,132,184,0.7);}

/* APP */
#app{display:none;flex-direction:column;height:100vh;}
header{background:var(--blue-dk);border-bottom:3px solid var(--gold);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,0.4);position:sticky;top:0;z-index:20;}
.hdr-logo{display:flex;align-items:center;}
.hdr-logo svg{height:38px;width:auto;display:block;border-radius:4px;}
.hdr-divider{width:1px;height:34px;background:var(--border);}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;color:var(--cream);letter-spacing:.1em;text-transform:uppercase;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-user{font-size:.72rem;color:var(--muted);background:var(--navy);padding:3px 10px;border-radius:99px;border:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.hdr-user-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0;}
.btn-new{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:var(--navy-deep);border:none;border-radius:6px;padding:6px 14px;cursor:pointer;transition:all .15s;}
.btn-new:hover{background:#f8c040;transform:translateY(-1px);}
.btn-signout{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .15s;}
.btn-signout:hover{color:var(--cream);border-color:var(--muted);}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:var(--navy);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.view-toggle-btn{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--muted);border:none;padding:5px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.view-toggle-btn:hover{color:var(--cream);}
.view-toggle-btn.active{background:var(--blue-md);color:var(--cream);}

/* Filter bar */
.filter-bar{background:var(--navy);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;position:sticky;top:63px;z-index:19;}
.filter-bar label{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.filter-select{font-family:'Barlow',sans-serif;font-size:.78rem;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 8px;cursor:pointer;}
.filter-select:focus{outline:none;border-color:var(--gold);}
.filter-count{margin-left:auto;font-size:.72rem;color:var(--muted);}
.filter-search{font-family:'Barlow',sans-serif;font-size:.78rem;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 10px 4px 28px;outline:none;transition:border-color .15s;width:180px;}
.filter-search:focus{border-color:var(--gold);}
.filter-search-wrap{position:relative;display:flex;align-items:center;}
.filter-search-wrap::before{content:'⌕';position:absolute;left:8px;color:var(--muted);font-size:.9rem;pointer-events:none;}

/* ── KANBAN ────────────────────────────────────────── */
#board-kanban{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:10px;padding:16px 20px;align-items:stretch;min-height:0;}
#board-kanban::-webkit-scrollbar{height:5px;width:4px;}
#board-kanban::-webkit-scrollbar-track{background:transparent;}
#board-kanban::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
#board-kanban::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18);}
.col{flex-shrink:0;width:230px;display:flex;flex-direction:column;gap:0;max-height:100%;overflow-y:auto;border-radius:8px;scrollbar-width:none;}
.col::-webkit-scrollbar{display:none;}
.col-head{display:flex;align-items:center;gap:7px;background:var(--col-bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;position:sticky;top:0;z-index:2;margin-bottom:8px;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-name{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--cream);flex:1;}
.col-count{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;color:var(--muted);background:var(--navy);padding:1px 6px;border-radius:99px;border:1px solid var(--border);}
.col-cards{display:flex;flex-direction:column;gap:7px;min-height:48px;border-radius:0 0 8px 8px;padding:6px;transition:background .15s;}
.col-cards.drag-over{background:var(--accent-dim);outline:1px dashed rgba(59,130,246,0.4);outline-offset:-3px;}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:grab;position:relative;transition:border-color .15s,box-shadow .15s,transform .1s;}
.card.is-critical{border-color:rgba(226,75,74,.5);padding-top:0;}
.card.is-critical:hover{border-color:#e24b4a;}
.critical-ribbon{background:#e24b4a;color:#fff;font-size:.62rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.1em;text-transform:uppercase;padding:3px 11px;margin:0 -11px 9px -11px;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:5px;}
.critical-ribbon-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.7);flex-shrink:0;}
.critical-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--input-bg);cursor:pointer;user-select:none;transition:border-color .15s;}
.critical-toggle:hover{border-color:rgba(226,75,74,.5);}
.critical-toggle.on{border-color:#e24b4a;background:rgba(226,75,74,.08);}
.critical-toggle-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--muted);transition:all .15s;flex-shrink:0;}
.critical-toggle.on .critical-toggle-dot{background:#e24b4a;border-color:#e24b4a;}
.critical-toggle-label{font-size:.78rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.critical-toggle.on .critical-toggle-label{color:#e24b4a;}
.card:hover{border-color:rgba(59,130,246,0.6);box-shadow:0 4px 14px rgba(0,0,0,0.35);}
.card.dragging{opacity:.35;cursor:grabbing;transform:rotate(1deg) scale(.97);}
.card-actions{position:absolute;top:7px;right:7px;display:none;gap:4px;}
.card:hover .card-actions{display:flex;}
.card-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--navy);color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.card-btn:hover{color:var(--cream);border-color:var(--muted);}
.card-btn-del:hover{color:var(--danger);border-color:var(--danger);}
.card-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.03em;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:52px;margin-bottom:6px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:.63rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:99px;border:1px solid;}
.tag-project{background:rgba(239,171,40,.12);color:var(--gold);border-color:rgba(239,171,40,.25);}
.tag-machine{background:rgba(68,108,227,.12);color:#7fa8f5;border-color:rgba(68,108,227,.25);}
.tag-parttype{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.2);}
.tag-finish{background:rgba(180,180,180,.1);color:#a0a0a0;border-color:rgba(180,180,180,.22);display:inline-flex;align-items:center;gap:5px;}
.tag-finish .pc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;}
.card-meta{display:flex;flex-direction:column;gap:2px;}
.card-meta-row{font-size:.7rem;color:var(--muted);}
.card-meta-row strong{color:var(--text);font-weight:600;}
.card-notes{font-size:.7rem;color:var(--muted);margin-top:5px;font-style:italic;line-height:1.4;border-top:1px solid var(--border);padding-top:5px;}
.card-cad{margin-top:5px;}
.card-cad a{font-size:.68rem;color:#7fa8f5;text-decoration:none;}
.card-cad a:hover{color:#a8c4f8;text-decoration:underline;}
.col-empty{font-size:.7rem;color:var(--muted);text-align:center;padding:16px 8px;border:1px dashed rgba(47,78,148,.4);border-radius:7px;opacity:.6;}
.btn-step{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.25);border-radius:5px;padding:3px 9px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-step:hover{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.5);}
.btn-step:disabled{opacity:.5;cursor:not-allowed;}
.btn-pdf{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25);border-radius:5px;padding:3px 9px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-pdf:hover{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.5);}
.btn-pdf:disabled{opacity:.5;cursor:not-allowed;}

/* ── LIST VIEW ─────────────────────────────────────── */
#board-list{display:none;flex-direction:column;gap:0;padding:16px 20px;flex:1;overflow-y:auto;min-height:0;}
.list-table-wrap{overflow-x:auto;}
.list-table-wrap::-webkit-scrollbar{height:4px;}
.list-table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
#board-list::-webkit-scrollbar{width:4px;}
#board-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
#board-list::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18);}

.list-group{margin-bottom:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.list-group-header{display:flex;align-items:center;gap:10px;background:var(--col-bg);padding:9px 14px;cursor:pointer;user-select:none;}
.list-group-header:hover{background:rgba(255,255,255,0.04);}
.list-group-chevron{font-size:.7rem;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.list-group-chevron.collapsed{transform:rotate(-90deg);}
.list-group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.list-group-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--cream);flex:1;}
.list-group-count{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;color:var(--muted);background:var(--navy);padding:1px 8px;border-radius:99px;border:1px solid var(--border);}

.list-table{width:100%;border-collapse:collapse;}
.list-table th{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:7px 14px;text-align:left;border-bottom:1px solid var(--border);background:rgba(13,26,54,0.6);white-space:nowrap;}
.list-table th.sortable{cursor:pointer;}
.list-table th.sortable:hover{color:var(--cream);}
.list-table th .sort-arrow{margin-left:4px;opacity:.4;font-size:.6rem;}
.list-table th.sort-asc .sort-arrow::after{content:'▲';opacity:1;}
.list-table th.sort-desc .sort-arrow::after{content:'▼';opacity:1;}
.list-table td{padding:8px 14px;border-bottom:1px solid rgba(47,78,148,0.25);vertical-align:middle;font-size:.8rem;color:var(--text);}
.list-table tr:last-child td{border-bottom:none;}
.list-table tr:hover td{background:rgba(68,108,227,0.06);cursor:pointer;}
.list-table tr.list-row-empty td{color:var(--muted);font-style:italic;text-align:center;padding:16px;}
.list-table tr.is-critical td:first-child{border-left:3px solid #e24b4a;}
.lt-critical-badge{display:inline-flex;align-items:center;gap:3px;background:#e24b4a;color:#fff;font-size:.58rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.1em;text-transform:uppercase;padding:1px 5px;border-radius:3px;vertical-align:middle;margin-left:5px;}

.lt-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;color:var(--cream);letter-spacing:.02em;}
.lt-name-sub{font-size:.68rem;color:var(--muted);margin-top:1px;}
.lt-badge{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap;display:inline-block;}
.lt-badge-machine{background:rgba(68,108,227,.12);color:#7fa8f5;border-color:rgba(68,108,227,.3);}
.lt-badge-project{background:rgba(239,171,40,.1);color:var(--gold);border-color:rgba(239,171,40,.25);}
.lt-badge-finish{background:rgba(180,180,180,.1);color:#a0a0a0;border-color:rgba(180,180,180,.22);display:inline-flex;align-items:center;gap:5px;}
.lt-badge-finish .pc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;}
.lt-badge-parttype{background:rgba(52,211,153,.08);color:#34d399;border-color:rgba(52,211,153,.2);}
.lt-cad a{font-size:.68rem;color:var(--gold);text-decoration:none;}
.lt-cad a:hover{text-decoration:underline;}
.lt-notes{font-size:.68rem;color:var(--muted);font-style:italic;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lt-mat{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.lt-mat-name{font-size:.78rem;color:var(--text);}
.lt-mat-thick{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;color:var(--muted);background:var(--navy);padding:1px 6px;border-radius:4px;border:1px solid var(--border);}
.lt-date{font-size:.72rem;color:var(--muted);white-space:nowrap;}
.lt-qty{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;color:var(--text);}
.lt-assignee{font-size:.75rem;color:var(--muted);}
.lt-actions{display:flex;gap:4px;opacity:0;transition:opacity .1s;}
tr:hover .lt-actions{opacity:1;}
.lt-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--navy);color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;padding:0;}
.lt-btn:hover{color:var(--cream);border-color:var(--muted);}
.lt-btn-del:hover{color:var(--danger);border-color:var(--danger);}
.lt-step-btn{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:rgba(52,211,153,.08);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:4px;padding:2px 7px;cursor:pointer;white-space:nowrap;}
.lt-step-btn:hover{background:rgba(52,211,153,.18);}
.lt-step-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── DETAIL MODAL ──────────────────────────────────────── */
#detail-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
#detail-backdrop.open{display:flex;}
.detail-modal{background:var(--blue-dk);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
.detail-modal::-webkit-scrollbar{width:4px;}
.detail-modal::-webkit-scrollbar-thumb{background:var(--border);}
.detail-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.detail-thumb{width:100%;border-radius:8px;display:block;margin-bottom:14px;}
.card-thumb{width:100%;border-radius:5px;display:block;margin-bottom:8px;}
.detail-header-text{flex:1;min-width:0;}
.detail-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:.03em;color:var(--cream);line-height:1.2;margin-bottom:8px;}
.detail-status{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.detail-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.detail-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s;}
.detail-close:hover{color:var(--cream);border-color:var(--muted);}
.detail-body{padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-field{display:flex;flex-direction:column;gap:3px;}
.detail-field.full{grid-column:1/-1;}
.detail-field-label{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.detail-field-value{font-size:.84rem;color:var(--cream);}
.detail-field-value.empty{color:var(--muted);font-style:italic;}
.detail-notes{background:var(--navy);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.82rem;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;}
.detail-divider{border:none;border-top:1px solid var(--border);margin:0;}
.detail-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--navy);border-radius:0 0 14px 14px;}
.detail-cad-link{font-size:.78rem;color:#7fa8f5;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.detail-cad-link:hover{color:#a8c4f8;text-decoration:underline;}
.detail-submitted{font-size:.72rem;color:var(--muted);margin-top:2px;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--blue-dk);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:1/-1;}
.field label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.field input,.field select,.field textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.84rem;padding:7px 9px;outline:none;transition:border-color .15s;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue-lt);}
.field select option{background:var(--blue-dk);}
.field textarea{resize:vertical;min-height:56px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:4px;}
.btn-cancel{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:7px 16px;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{color:var(--cream);border-color:var(--muted);}
.btn-save{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--gold);color:var(--navy-deep);border:none;border-radius:6px;padding:7px 20px;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.btn-delete{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--danger);border:1px solid rgba(224,82,82,.3);border-radius:6px;padding:7px 14px;cursor:pointer;transition:all .15s;margin-right:auto;}
.btn-delete:hover{background:rgba(224,82,82,.1);}

#loading{position:fixed;inset:0;background:rgba(8,15,36,.8);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:90;}
#loading.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--blue-dk);color:var(--cream);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.06em;padding:10px 20px;border-radius:99px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;}
#toast.error{border-color:var(--danger);color:var(--danger);}
</style>
</head>

<script>
const ALLOWED_DOMAIN = TEAM_CONFIG.googleAllowedDomain;
const BOARD_API = '/api/board';
const STATUSES = TEAM_CONFIG.statuses;

// ── Apply config on boot ─────────────────────────────────────────────────────
(function applyConfig() {
  // Accent CSS variable
  if (TEAM_CONFIG.accentColor) {
    document.documentElement.style.setProperty('--accent', TEAM_CONFIG.accentColor);
    const h = TEAM_CONFIG.accentColor.replace('#','');
    const r=(parseInt(h,16)>>16)&255, g=(parseInt(h,16)>>8)&255, b=parseInt(h,16)&255;
    document.documentElement.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.15)`);
  }
  // Auth screen GIS client id + domain hint
  const gsiEl = document.getElementById('g_id_onload');
  if (gsiEl) gsiEl.setAttribute('data-client_id', TEAM_CONFIG.googleClientId || '');
  const domainMsg = document.getElementById('auth-domain-msg');
  if (domainMsg) domainMsg.textContent =
    'Sign in with your @' + (TEAM_CONFIG.googleAllowedDomain || 'google.com') + ' account to access the board.';

  // Helper to populate a <select> from an array
  function fillSelect(id, items, defaultLabel) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = `<option value="">${defaultLabel}</option>` +
      items.map(v => `<option>${v}</option>`).join('');
  }

  // Filter bar dropdowns
  fillSelect('filter-project',   TEAM_CONFIG.projects,    'All Projects');
  fillSelect('filter-machine',   TEAM_CONFIG.machines,    'All Machines');
  fillSelect('filter-material',  TEAM_CONFIG.materials,   'All Materials');
  fillSelect('filter-thickness', TEAM_CONFIG.thicknesses, 'All Thicknesses');

  // Card modal selects
  fillSelect('f-status',    TEAM_CONFIG.statuses.map(s => s.id), '—');
  fillSelect('f-project',   TEAM_CONFIG.projects,    '—');
  fillSelect('f-machine',   TEAM_CONFIG.machines,    '—');
  fillSelect('f-parttype',  TEAM_CONFIG.partTypes,   '—');
  fillSelect('f-material',  TEAM_CONFIG.materials,   '—');
  fillSelect('f-thickness', TEAM_CONFIG.thicknesses, '—');
  fillSelect('f-finish',    TEAM_CONFIG.finishes,    '—');
})();

let allCards = [], editingId = null, userEmail = null, dragCardId = null;
let currentView = 'kanban'; // 'kanban' | 'list'
let collapsedGroups = new Set(); // which status groups are collapsed in list view

// ── VIEW TOGGLE ──────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btn-view-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('btn-view-list').classList.toggle('active', v === 'list');
  document.getElementById('board-kanban').style.display = v === 'kanban' ? 'flex' : 'none';
  document.getElementById('board-list').style.display   = v === 'list'   ? 'flex' : 'none';

  const app = document.getElementById('app');
  if (v === 'list') {
    document.documentElement.style.height = 'auto';
    document.documentElement.style.overflow = 'auto';
    document.body.style.height = 'auto';
    document.body.style.overflow = 'auto';
    app.style.height = 'auto';
    app.style.overflow = 'visible';
  } else {
    document.documentElement.style.height = '100%';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.height = '100%';
    document.body.style.overflow = 'hidden';
    app.style.height = '100vh';
    app.style.overflow = 'hidden';
  }
  renderCurrentView();
}

function renderCurrentView() {
  if (currentView === 'kanban') buildBoard();
  else buildListView();
}

// ── AUTH ────────────────────────────────────────────────────
function handleGoogleSignIn(response) {
  const p = parseJwt(response.credential);
  if (!p.email.endsWith('@' + ALLOWED_DOMAIN)) {
    const err = document.getElementById('auth-error');
    err.textContent = 'Access restricted to @' + ALLOWED_DOMAIN + ' accounts.';
    err.style.display = 'block'; return;
  }
  userEmail = p.email;
  // Persist session so refresh doesn't require re-login
  localStorage.setItem('mfg_user_email', p.email);
  localStorage.setItem('mfg_user_name', p.name || p.email);
  document.getElementById('hdr-user').textContent = p.name || p.email;
  showApp();
}
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.height = '100vh';
  app.style.overflow = 'hidden';
  document.getElementById('board-kanban').style.display = 'flex';
  document.getElementById('board-list').style.display = 'none';
  loadCards();
}
function signOut() {
  try { google.accounts.id.disableAutoSelect(); } catch(_) {}
  localStorage.removeItem('mfg_user_email');
  localStorage.removeItem('mfg_user_name');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  userEmail = null; allCards = [];
}
function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }

window.addEventListener('DOMContentLoaded', () => {
  // Dev bypass: append ?dev=1 to skip Google auth entirely
  if (new URLSearchParams(location.search).get('dev') === '1') {
    userEmail = 'dev@localhost';
    document.getElementById('hdr-user').textContent = 'Dev Mode';
    const badge = document.createElement('span');
    badge.textContent = 'DEV';
    badge.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;background:#fbbf24;color:#0d1117;border-radius:4px;padding:2px 5px;margin-left:6px;';
    document.getElementById('hdr-user').after(badge);
    showApp();
    return;
  }
  // Restore session from localStorage — no re-login needed on refresh
  const savedEmail = localStorage.getItem('mfg_user_email');
  const savedName  = localStorage.getItem('mfg_user_name');
  if (savedEmail && savedEmail.endsWith('@' + ALLOWED_DOMAIN)) {
    userEmail = savedEmail;
    document.getElementById('hdr-user').textContent = savedName || savedEmail;
    showApp();
    return;
  }
  // No valid session — show auth screen (GSI auto-prompt will fire if user was recently signed in)
});

// ── API ─────────────────────────────────────────────────────
async function apiGet() {
  const r = await fetch(BOARD_API);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'API error');
  return d;
}
async function apiPost(body) {
  const r = await fetch(BOARD_API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'API error');
  return d;
}

// ── LOAD ────────────────────────────────────────────────────
async function loadCards() {
  showLoading(true);
  try {
    const d = await apiGet();
    allCards = d.cards || [];
    renderCurrentView();
    populateFilterDropdowns();
  } catch(e) { toast('Failed to load: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

// Silent background poll — only re-renders if something actually changed
async function pollCards() {
  try {
    const d = await apiGet();
    const fresh = d.cards || [];
    const changed =
      fresh.length !== allCards.length ||
      fresh[0]?.updated_at !== allCards[0]?.updated_at ||
      fresh[0]?.id !== allCards[0]?.id;
    if (changed) {
      allCards = fresh;
      renderCurrentView();
      populateFilterDropdowns();
    }
  } catch(_) { /* silent — don't toast on background poll failures */ }
}
setInterval(pollCards, 30000);

// ── FILTER HELPER ────────────────────────────────────────────
function getFiltered() {
  const fp = document.getElementById('filter-project').value;
  const fm = document.getElementById('filter-machine').value;
  const fa = document.getElementById('filter-assigned').value;
  const fmat = document.getElementById('filter-material').value;
  const fthk = document.getElementById('filter-thickness').value;
  const fs = document.getElementById('filter-search').value.trim().toLowerCase();
  const filtered = allCards.filter(c =>
    (!fp   || c.project    === fp)   &&
    (!fm   || c.machine    === fm)   &&
    (!fa   || c.assigned_to === fa)  &&
    (!fmat || c.material   === fmat) &&
    (!fthk || fmtThickness(c.thickness) === fthk) &&
    (!fs   || c.name.toLowerCase().includes(fs))
  ).sort((a, b) => {
    if (a.is_critical && !b.is_critical) return -1;
    if (!a.is_critical && b.is_critical) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });
  document.getElementById('filter-count').textContent =
    `${filtered.length} of ${allCards.length} card${allCards.length!==1?'s':''}`;
  return filtered;
}

// ── KANBAN ───────────────────────────────────────────────────
function buildBoard() {
  const filtered = getFiltered();
  const board = document.getElementById('board-kanban');
  board.innerHTML = '';
  STATUSES.forEach(s => {
    const cards = filtered.filter(c => c.status === s.id);
    const col = document.createElement('div');
    col.className = 'col'; col.dataset.status = s.id;
    col.innerHTML = `
      <div class="col-head">
        <div class="col-dot" style="background:${s.color}"></div>
        <span class="col-name">${s.id}</span>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-cards" data-status="${s.id}">
        ${cards.length===0?'<div class="col-empty">No cards</div>':''}
      </div>`;
    board.appendChild(col);
    const zone = col.querySelector('.col-cards');
    cards.forEach(c => zone.appendChild(makeCardEl(c)));
    setupDropZone(zone);
  });
}

function makeCardEl(card) {
  const el = document.createElement('div');
  el.className = 'card' + (card.is_critical ? ' is-critical' : ''); el.dataset.id = card.id; el.draggable = true;
  el.addEventListener('dragstart', e => {
    dragCardId = card.id;
    setTimeout(() => el.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.col-cards').forEach(z => z.classList.remove('drag-over'));
  });
  const tags = [];
  if (card.project)  tags.push(`<span class="tag tag-project">${card.project}</span>`);
  if (card.machine)  tags.push(`<span class="tag tag-machine">${card.machine}</span>`);
  if (card.part_type) tags.push(`<span class="tag tag-parttype">${fmtPartType(card.part_type)}</span>`);
  const _finish = fmtFinish(card.finish);
  if (_finish) {
    const _fraw = (card.finish || '').replace('Powder Coat — ', '').toLowerCase();
    const _dotColors = { blue:'#4d8fff', black:'#404040', yellow:'#FACB43', pink:'#FF69B4' };
    const _dotColor = _dotColors[_fraw];
    const _dotHtml = _dotColor ? `<span class="pc-dot" style="background:${_dotColor};${_fraw==='black'?'outline:1px solid rgba(255,255,255,.2);outline-offset:0;':''}"></span>` : '';
    const _label = _finish.replace('Powder Coat — ','PC ');
    tags.push(`<span class="tag tag-finish">${_dotHtml}${_label}</span>`);
  }
  const meta = [];
  const mat = [card.material, fmtThickness(card.thickness)].filter(Boolean).join(' · ');
  if (mat) meta.push(`<div class="card-meta-row"><strong>${mat}</strong></div>`);
  if (card.quantity) meta.push(`<div class="card-meta-row">Qty: <strong>${card.quantity}</strong></div>`);
  if (card.assigned_to) meta.push(`<div class="card-meta-row">→ <strong>${card.assigned_to}</strong></div>`);
  if (card.submitted_by || card.created_at) {
    const _by = card.submitted_by ? card.submitted_by.replace(/@.*$/,'') : null;
    const _when = card.created_at ? timeAgo(card.created_at) : null;
    const _sub = [_by, _when].filter(Boolean).join(' · ');
    meta.push(`<div class="card-meta-row" style="color:var(--muted);font-size:.65rem;">${esc(_sub)}</div>`);
  }
  el.innerHTML = `
    ${card.is_critical ? `<div class="critical-ribbon"><div class="critical-ribbon-dot"></div>Critical</div>` : ''}
    <div class="card-actions">
      <button class="card-btn card-btn-edit" onclick="event.stopPropagation();openEditModal('${card.id}')" title="Edit">✎</button>
      <button class="card-btn card-btn-del" onclick="event.stopPropagation();confirmDelete('${card.id}')" title="Delete">✕</button>
    </div>
    <div class="card-name" title="${esc(card.name)}">${esc(card.name)}</div>
    ${tags.length?`<div class="card-tags">${tags.join('')}</div>`:''}
    ${meta.length?`<div class="card-meta">${meta.join('')}</div>`:''}
    ${card.notes?`<div class="card-notes">${esc(card.notes.slice(0,80))}${card.notes.length>80?'…':''}</div>`:''}
    ${(card.cad_link || card.step_file_url || card.pdf_file_url) ? `<div class="card-cad" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      ${card.cad_link?`<a href="${esc(card.cad_link)}" target="_blank" onclick="event.stopPropagation()">↗ Open in OnShape</a>`:''}
      <span style="flex:1;"></span>
      ${card.step_file_url?`<button class="btn-step" onclick="event.stopPropagation();downloadStep(event,'${card.id}','${esc(card.step_file_name||card.step_file_url)}')">⬇ ${(card.step_file_name||'').toLowerCase().endsWith('.dxf')?'DXF':'STEP'}</button>`:''}
      ${card.pdf_file_url?`<button class="btn-pdf" onclick="event.stopPropagation();downloadPdf(event,'${card.id}','${esc(card.pdf_file_name||card.pdf_file_url)}')">⬇ PDF</button>`:''}
    </div>`:''}`;
  el.addEventListener('click', e => {
    if (e.target.closest('.card-actions') || e.target.closest('a') || e.target.closest('.btn-step')) return;
    openDetailModal(card.id);
  });
  return el;
}

function toggleGroup(statusId, groupEl) {
  const isNowCollapsed = !collapsedGroups.has(statusId);
  if (isNowCollapsed) collapsedGroups.add(statusId);
  else collapsedGroups.delete(statusId);
  const chevron = groupEl.querySelector('.list-group-chevron');
  const tableWrap = groupEl.querySelector('.list-table-wrap');
  chevron.classList.toggle('collapsed', isNowCollapsed);
  tableWrap.style.display = isNowCollapsed ? 'none' : 'block';
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return '1 day ago';
  if (days < 30) return `${days} days ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 8) return `${weeks}w ago`;
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function populateFilterDropdowns() {
  const assignSel = document.getElementById('filter-assigned'), curA = assignSel.value;
  const names = [...new Set(allCards.map(c=>c.assigned_to).filter(Boolean))].sort();
  assignSel.innerHTML = '<option value="">All Assignees</option>' +
    names.map(n=>`<option${n===curA?' selected':''}>${esc(n)}</option>`).join('');

  const matSel = document.getElementById('filter-material'), curM = matSel.value;
  const mats = [...new Set(allCards.map(c=>c.material).filter(Boolean))].sort();
  matSel.innerHTML = '<option value="">All Materials</option>' +
    mats.map(m=>`<option${m===curM?' selected':''}>${esc(m)}</option>`).join('');

  const thkSel = document.getElementById('filter-thickness'), curT = thkSel.value;
  const thks = [...new Set(allCards.map(c=>fmtThickness(c.thickness)).filter(Boolean))].sort();
  thkSel.innerHTML = '<option value="">All Thicknesses</option>' +
    thks.map(t=>`<option value="${esc(t)}"${t===curT?' selected':''}>${esc(t)}</option>`).join('');

// ── DRAG & DROP ─────────────────────────────────────────────
function setupDropZone(zone) {
  zone.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (!dragCardId) return;
    const newStatus = zone.dataset.status;
    const card = allCards.find(c=>c.id===dragCardId);
    if (!card || card.status===newStatus) return;
    card.status = newStatus; buildBoard();
    try { await apiPost({ action:'moveCard', id:dragCardId, status:newStatus }); }
    catch(e) { toast('Move failed: '+e.message,'error'); loadCards(); }
  });
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function toggleCritical() { document.getElementById('critical-toggle').classList.toggle('on'); }
function handleBackdropClick(e) { if(e.target===e.currentTarget) closeModal(); }

async function saveCard() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Part name is required','error'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Saving...';
  const updates = {
    name, status:document.getElementById('f-status').value,
    project:document.getElementById('f-project').value,
    machine:document.getElementById('f-machine').value,
    partType:document.getElementById('f-parttype').value,
    material:document.getElementById('f-material').value,
    thickness:document.getElementById('f-thickness').value,
    finish:document.getElementById('f-finish').value,
    quantity:document.getElementById('f-qty').value,
    assigned:document.getElementById('f-assigned').value,
    cadLink:document.getElementById('f-cadlink').value,
    notes:document.getElementById('f-notes').value,
    isCritical: document.getElementById('critical-toggle').classList.contains('on'),
  };
  try {
    if (editingId) {
      await apiPost({ action:'updateCard', id:editingId, updates });
      const idx = allCards.findIndex(c=>c.id===editingId);
      if (idx>=0) allCards[idx] = { ...allCards[idx],
        name:updates.name, status:updates.status, project:updates.project,
        machine:updates.machine, part_type:updates.partType, material:updates.material,
        thickness:updates.thickness, finish:updates.finish, quantity:updates.quantity,
        assigned_to:updates.assigned, cad_link:updates.cadLink, notes:updates.notes,
        is_critical:updates.isCritical,
        submitted_by:allCards[idx].submitted_by, created_at:allCards[idx].created_at };
      toast('Card updated');
    } else {
      const res = await apiPost({ action:'createCard', card:{ ...updates, submittedBy:userEmail } });
      allCards.unshift(res.card);
      toast('Card created');
    }
    closeModal(); renderCurrentView(); populateFilterDropdowns();
  } catch(e) { toast('Error: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent=editingId?'Save Changes':'Create Card'; }
}
function deleteCurrentCard() { if(editingId) confirmDelete(editingId, true); }
async function confirmDelete(id, fromModal=false) {
  if (!confirm('Delete this card? Cannot be undone.')) return;
  if (fromModal) closeModal();
  allCards = allCards.filter(c=>c.id!==id); renderCurrentView();
  try { await apiPost({ action:'deleteCard', id }); toast('Card deleted'); }
  catch(e) { toast('Delete failed: '+e.message,'error'); loadCards(); }
}

// ── STEP / DXF DOWNLOAD ─────────────────────────────────────────────────────
async function downloadStep(e, cardId, filename) {
  const btn = e.target;
  btn.disabled = true; btn.textContent = '⏳';
  const isDxf = (filename||'').toLowerCase().endsWith('.dxf');
  try {
    const card = allCards.find(c => c.id === cardId);
    if (!card?.step_file_url) throw new Error('No file on this card');
    const a = document.createElement('a');
    const fallback = isDxf ? 'part.dxf' : 'part.step';
    a.href = card.step_file_url; a.download = filename || fallback; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading ' + (filename || fallback));
  } catch(err) { toast('Download failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ ' + (isDxf ? 'DXF' : 'STEP'); }
}

// ── PDF DOWNLOAD ─────────────────────────────────────────────
async function downloadPdf(e, cardId, filename) {
  const btn = e.target;
  btn.disabled = true; btn.textContent = '⏳';
  try {
    const card = allCards.find(c => c.id === cardId);
    if (!card?.pdf_file_url) throw new Error('No PDF file on this card');
    const a = document.createElement('a');
    a.href = card.pdf_file_url; a.download = filename || 'drawing.pdf'; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading ' + (filename || 'drawing.pdf'));
  } catch(err) { toast('Download failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ PDF'; }
}

  }

  // CAD link
  const cadWrap = document.getElementById('detail-cad-wrap');
  const cadLink = document.getElementById('detail-cad');
  if (card.cad_link) {
    cadLink.href = card.cad_link;
    cadWrap.style.display = 'flex';
  } else {
    cadWrap.style.display = 'none';
  }

  // STEP button
  const stepBtn = document.getElementById('detail-btn-step');
  stepBtn.style.display = card.step_file_url ? 'inline-flex' : 'none';
  stepBtn.textContent = '⬇ ' + ((card.step_file_name||'').toLowerCase().endsWith('.dxf') ? 'DXF' : 'STEP');
  stepBtn.disabled = false;

  // PDF button
  const pdfBtn = document.getElementById('detail-btn-pdf');
  pdfBtn.style.display = card.pdf_file_url ? 'inline-flex' : 'none';
  pdfBtn.textContent = '⬇ PDF';
  pdfBtn.disabled = false;

  document.getElementById('detail-backdrop').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-backdrop').classList.remove('open');
  detailCardId = null;
}
function handleDetailBackdropClick(e) { if (e.target === e.currentTarget) closeDetailModal(); }
function editFromDetail() { const id = detailCardId; closeDetailModal(); openEditModal(id); }
function deleteFromDetail() { const id = detailCardId; closeDetailModal(); confirmDelete(id); }
async function downloadStepFromDetail() {
  const card = allCards.find(c => c.id === detailCardId);
  if (!card) return;
  const btn = document.getElementById('detail-btn-step');
  btn.disabled = true; btn.textContent = '⏳';
  const isDxf = (card.step_file_name||'').toLowerCase().endsWith('.dxf');
  try {
    if (!card.step_file_url) throw new Error('No file on this card');
    const a = document.createElement('a');
    const fallback = isDxf ? 'part.dxf' : 'part.step';
    a.href = card.step_file_url; a.download = card.step_file_name || fallback; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading ' + (card.step_file_name || fallback));
  } catch(err) { toast('Download failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ ' + (isDxf ? 'DXF' : 'STEP'); }
}

async function downloadPdfFromDetail() {
  const card = allCards.find(c => c.id === detailCardId);
  if (!card) return;
  const btn = document.getElementById('detail-btn-pdf');
  btn.disabled = true; btn.textContent = '⏳';
  try {
    if (!card.pdf_file_url) throw new Error('No PDF file on this card');
    const a = document.createElement('a');
    a.href = card.pdf_file_url; a.download = card.pdf_file_name || 'drawing.pdf'; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Downloading ' + (card.pdf_file_name || 'drawing.pdf'));
  } catch(err) { toast('Download failed: ' + err.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ PDF'; }
}

// ── UTILS ───────────────────────────────────────────────────
// Normalize thickness display: "1/2 in" (OnShape) → "1/2"" (board standard)
function fmtThickness(t) {
  if (!t) return null;
  return t.replace(/\s*in$/i, '"');
}
// Normalize finish: "Blue" → "Powder Coat — Blue" for powder coat colors
const PC_COLORS = new Set(['Blue','Black','Yellow','Pink']);
function fmtFinish(f) {
  if (!f || f === 'None') return null;
  if (PC_COLORS.has(f)) return 'Powder Coat — ' + f;
  return f;
}
// Normalize part type: "Tube 1×1in" / "Tube 1x1in" → "Tube 1×1\""
function fmtPartType(p) {
  if (!p) return null;
  return p.replace(/[xX×](\d)/g, '×$1').replace(/in$/i, '"');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showLoading(on) { document.getElementById('loading').classList.toggle('show',on); }
let toastTimer;
function toast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=type==='error'?'error show':'show';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className=type==='error'?'error':'',3000);
}
</script>
